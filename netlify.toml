[build]
  publish = "."

# IMPORTANT: use the "/*" splat, which reliably matches files in
# subdirectories (e.g. /js/engine.js, /css/style.css). Earlier rules used
# "/*.js" and "/*.html", which on Netlify do NOT match nested paths — so the
# no-cache header never reached the ES modules under /js/, and browsers kept
# serving stale code even after fixes were deployed.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache"
