name: Direct Deploy

on:
  push:
    branches: [deploy-fix-temp]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy fixed files directly to Netlify
        run: |
          rm -rf .github
          npx -y netlify-cli@latest deploy --prod --dir=. --site=1df0b778-c38b-4a8e-ac7d-42d2e3e4bc77 --auth=nfp_dRq39DWBjqZz5Dpki4cCv3evdgg791Pa6230
