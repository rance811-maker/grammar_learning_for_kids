name: Direct Deploy
on:
  push:
    branches: [deploy-fix-temp3]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify rest
        run: |
          base=https://grammar-quest-pet.netlify.app
          echo "== time-marker =="; curl -s $base/js/data/units-01-03.js | grep -o "现在进行时 · right now 此刻" | head -1 || echo MISSING
          echo "== much/many =="; curl -s $base/js/data/units-10-12.js | grep -o "不可数 (sugar 糖)" | head -1 || echo MISSING
